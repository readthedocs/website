exclude: |
  (?x)^(
    common/|
    dist/|
    readthedocs_theme/static/
  )

repos:
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: "v3.8.3"
    hooks:
      - id: prettier
        args: ["--write"]
        types_or: [css, javascript, json]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: check-vcs-permalinks
      - id: check-yaml
      - id: destroyed-symlinks
      - id: end-of-file-fixer

  # Ensure Python code is formatted
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.13
    hooks:
      # Run the linter.
      - id: ruff-check
        args: [--fix]
      # Run the formatter.
      - id: ruff-format

  # Ensure uv.lock is updated when pyproject.toml is changed
  - repo: https://github.com/astral-sh/uv-pre-commit
    # uv version.
    rev: 0.11.14
    hooks:
      - id: uv-lock

  - repo: local
    hooks:
      - id: check-build-assets
        name: Ensure compiled assets are current
        description: Ensure that `npm run build` was run before commiting.
        language: script
        types_or: [css, javascript, svg, json]
        entry: .pre-commit/check-build-assets.sh
